name: iOS / iPadOS

on:
  pull_request:
    paths:
      - '.github/workflows/ios.yml'
      - 'docs/platform/ios-ipados-port.md'
      - 'ios/**'
      - 'scripts/ci/ios-build.sh'
      - 'scripts/ci/ios-package.sh'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/ios.yml'
      - 'docs/platform/ios-ipados-port.md'
      - 'ios/**'
      - 'scripts/ci/ios-build.sh'
      - 'scripts/ci/ios-package.sh'
  workflow_dispatch:
    inputs:
      package_ipa:
        description: 'Archive and export an IPA after a successful build'
        required: false
        default: false
        type: boolean
      unsigned_ipa:
        description: 'Generate an unsigned IPA by disabling code signing and zipping Payload/*.app'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build:
    name: Build and test iOS/iPadOS
    runs-on: macos-latest
    env:
      IOS_SCHEME: ${{ vars.IOS_SCHEME || 'AnkiDroid' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build and test
        run: scripts/ci/ios-build.sh

      - name: Package IPA
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.package_ipa }}
        env:
          IOS_UNSIGNED_IPA: ${{ inputs.unsigned_ipa }}
        run: scripts/ci/ios-package.sh

      - name: Upload IPA
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.package_ipa }}
        uses: actions/upload-artifact@v4
        with:
          name: AnkiDroid-iOS-IPA
          path: build/ios/ipa/*.ipa
          if-no-files-found: error
