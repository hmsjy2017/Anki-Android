name: iOS / iPadOS

on:
  pull_request:
    paths:
      - '.github/workflows/ios.yml'
      - 'docs/platform/ios-ipados-port.md'
      - 'ios/**'
      - 'scripts/ci/ios-build.sh'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/ios.yml'
      - 'docs/platform/ios-ipados-port.md'
      - 'ios/**'
      - 'scripts/ci/ios-build.sh'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and test iOS/iPadOS
    runs-on: macos-latest
    env:
      IOS_SCHEME: ${{ vars.IOS_SCHEME || 'AnkiDroid' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build and test
        run: scripts/ci/ios-build.sh
